<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" role="img" aria-labelledby="title desc">
  <title id="title">EREMIS Estate Agency Logo Dark Variant</title>
  <desc id="desc">Dark background variant of the EREMIS luxury real estate logo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061427"/>
      <stop offset="1" stop-color="#0B1F3B"/>
    </linearGradient>
    <linearGradient id="navyDepth" x1="160" y1="80" x2="520" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24507E"/>
      <stop offset="0.5" stop-color="#102B4D"/>
      <stop offset="1" stop-color="#07182D"/>
    </linearGradient>
    <linearGradient id="goldDepth" x1="110" y1="70" x2="430" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6D982"/>
      <stop offset="0.45" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#9C7425"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="720" height="620" rx="28" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <path d="M382 68c-140 7-247 118-247 257 0 59 20 114 54 158"
          fill="none" stroke="url(#goldDepth)" stroke-width="23" stroke-linecap="round"/>
    <path d="M224 413V286l42-42v169z" fill="url(#navyDepth)"/>
    <path d="M283 413V198l54-54v269z" fill="url(#navyDepth)"/>
    <path d="M354 413V263l42-42v192z" fill="url(#goldDepth)"/>
    <path d="M403 413V304l37-36v145z" fill="url(#goldDepth)"/>
    <path d="M347 128h213v76H436v83h106c23 0 42-6 57-18v82c-15-12-34-18-57-18H436v88h138c31 0 58-9 81-27l-19 84H347V214l-57-45z"
          fill="url(#navyDepth)"/>
    <path d="M177 445c104-26 302-27 407 0-115 15-292 15-407 0z" fill="#061427"/>
    <path d="M208 427c93-14 248-14 341 0" fill="none" stroke="url(#goldDepth)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="360" y="535" text-anchor="middle"
        font-family="Cinzel, Georgia, 'Times New Roman', serif"
        font-size="64" letter-spacing="25" fill="#F4F7FB">EREMIS</text>
  <line x1="164" y1="572" x2="242" y2="572" stroke="#C8A24A" stroke-width="5" stroke-linecap="round"/>
  <text x="360" y="582" text-anchor="middle"
        font-family="Montserrat, Avenir Next, Segoe UI, Arial, sans-serif"
        font-size="24" letter-spacing="14" font-weight="600" fill="#D6B45A">ESTATE AGENCY</text>
  <line x1="478" y1="572" x2="556" y2="572" stroke="#C8A24A" stroke-width="5" stroke-linecap="round"/>
</svg>
